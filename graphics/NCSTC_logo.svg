<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="Arial, Helvetica, sans-serif">
  <!-- NCSTC dove with olive branch (line art) -->
  <g fill="none" stroke="#312e9b" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- head, open beak, breast down to tail tip -->
    <path d="M152 102 C140 88 158 70 178 72 C198 74 214 86 222 100
             C234 122 240 150 232 176 C260 168 282 170 268 188
             C256 202 238 226 232 252 C230 268 234 284 246 296
             C236 300 220 296 210 284 C188 258 178 220 180 188
             C172 200 166 216 166 232 C152 220 148 196 156 174
             C146 160 142 130 152 102 Z" stroke-width="0" fill="none"/>
    <!-- beak + olive stem -->
    <path d="M158 100 L132 92"/>
    <path d="M134 93 C120 70 112 52 118 28"/>
    <!-- breast / front edge -->
    <path d="M160 108 C150 140 152 180 170 214 C186 244 214 274 244 290"/>
    <!-- head top to back/wing base -->
    <path d="M158 96 C170 74 198 66 224 74 C268 86 300 96 340 98"/>
    <!-- big upper wing sweeping right -->
    <path d="M250 84 C320 44 420 30 520 48 C570 58 610 76 632 96
             C580 92 540 94 512 100 C552 108 588 124 606 142
             C560 134 524 132 496 138 C528 152 552 170 562 188
             C516 174 478 168 450 170 C470 184 484 200 488 214
             C440 196 396 180 364 162"/>
    <!-- lower body line from breast to tail -->
    <path d="M340 98 C400 130 450 168 470 212 C440 228 400 232 366 224
             C330 216 296 198 272 176"/>
    <!-- tail -->
    <path d="M272 176 C260 210 246 256 244 290 C268 282 290 264 300 240"/>
    <!-- eye -->
    <circle cx="196" cy="98" r="9" fill="#312e9b" stroke="none"/>
  </g>
  <!-- olive leaves -->
  <g fill="#1e9e33" stroke="none">
    <ellipse cx="112" cy="30" rx="22" ry="8" transform="rotate(-35 112 30)"/>
    <ellipse cx="136" cy="22" rx="22" ry="8" transform="rotate(-10 136 22)"/>
    <ellipse cx="160" cy="26" rx="22" ry="8" transform="rotate(15 160 26)"/>
    <ellipse cx="118" cy="52" rx="20" ry="7" transform="rotate(-55 118 52)"/>
    <ellipse cx="140" cy="48" rx="20" ry="7" transform="rotate(25 140 48)"/>
  </g>
  <!-- wordmark -->
  <text x="360" y="316" text-anchor="middle" font-size="44" font-weight="bold">
    <tspan fill="#8b1a1a">राविप्रौसंप </tspan><tspan fill="#e02020">NCSTC</tspan>
  </text>
  <text x="360" y="354" text-anchor="middle" font-size="27" font-weight="bold" fill="#1a3aa8">SUPPORTED &amp; CATALYSED BY NCSTC, DST,</text>
  <text x="360" y="386" text-anchor="middle" font-size="27" font-weight="bold" fill="#1a3aa8">GOVT. OF INDIA</text>
</svg>
